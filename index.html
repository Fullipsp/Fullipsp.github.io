<!doctype html>
<html lang="en">

<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preload" as="image" fetchpriority="high" href="/banner.webp" />
  <link rel="preload" as="image" fetchpriority="high" href="/avatar.webp" />


  <link href="https://fonts.googleapis.com/css2?family=Alice&family=Berkshire+Swash&family=Great+Vibes&display=swap"
    rel="stylesheet">


  <title>Fullipsp</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
  <script>
    (function () {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect != location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
</body>

</html>
